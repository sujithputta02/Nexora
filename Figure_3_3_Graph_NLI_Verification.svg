<?xml version="1.0" encoding="UTF-8"?>
<!-- Figure 3.3 — Graph-NLI Verification Workflow
     Compatible with: Google Docs, LaTeX (svg package / Inkscape PDF export)
     Editable in: Inkscape, Adobe Illustrator, draw.io -->
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" viewBox="0 0 680 500"
     font-family="'Times New Roman', Times, serif" font-size="12">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444444"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-yes" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#222222">
    Figure 3.3 — Graph-NLI verification workflow
  </text>

  <!-- ── LLM Draft Response ── -->
  <rect x="215" y="42" width="210" height="40" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="320" y="62" text-anchor="middle" font-weight="bold" font-size="12" fill="#2C2C2A"
        dominant-baseline="central">LLM draft response</text>
  <line x1="320" y1="82" x2="320" y2="106" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>

  <!-- ── Step 1 – Entity Extraction ── -->
  <rect x="175" y="108" width="290" height="54" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="320" y="128" text-anchor="middle" font-weight="bold" font-size="12" fill="#26215C"
        dominant-baseline="central">Step 1 — Entity extraction</text>
  <text x="320" y="148" text-anchor="middle" font-size="11" fill="#3C3489"
        dominant-baseline="central">Subject-aware mission entity extraction</text>
  <line x1="320" y1="162" x2="320" y2="186" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>

  <!-- ── Step 2 – Neo4j Query ── -->
  <rect x="155" y="188" width="330" height="54" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="320" y="208" text-anchor="middle" font-weight="bold" font-size="12" fill="#04342C"
        dominant-baseline="central">Step 2 — Neo4j two-hop Cypher query</text>
  <text x="320" y="228" text-anchor="middle" font-size="11" fill="#085041"
        dominant-baseline="central">MATCH (n:Mission)-[r]-(m:Component) · fuzzy regex</text>
  <line x1="320" y1="242" x2="320" y2="266" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>

  <!-- ── Step 3 – NLI Classification ── -->
  <rect x="155" y="268" width="330" height="54" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="320" y="288" text-anchor="middle" font-weight="bold" font-size="12" fill="#042C53"
        dominant-baseline="central">Step 3 — Graph-Grounded NLI Audit</text>
  <text x="320" y="308" text-anchor="middle" font-size="11" fill="#0C447C"
        dominant-baseline="central">entail / contradict / neutral per atomic claim</text>
  <line x1="320" y1="322" x2="320" y2="350" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>

  <!-- ── Decision Diamond ── -->
  <polygon points="320,352 424,390 320,428 216,390"
           fill="#FFF8F5" stroke="#993C1D" stroke-width="1"/>
  <text x="320" y="386" text-anchor="middle" font-weight="bold" font-size="12" fill="#4A1B0C"
        dominant-baseline="central">Contradict?</text>
  <text x="320" y="402" text-anchor="middle" font-size="10" fill="#712B13"
        dominant-baseline="central">per atomic claim</text>

  <!-- Yes arrow (right) -->
  <line x1="424" y1="390" x2="542" y2="390" stroke="#993C1D" stroke-width="1.2"
        marker-end="url(#arrow-yes)"/>
  <text x="483" y="382" text-anchor="middle" font-size="10" fill="#993C1D">yes</text>

  <!-- ── CAUTION block ── -->
  <rect x="544" y="368" width="120" height="44" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="604" y="384" text-anchor="middle" font-weight="bold" font-size="12" fill="#4A1B0C"
        dominant-baseline="central">[CAUTION]</text>
  <text x="604" y="400" text-anchor="middle" font-size="10" fill="#712B13"
        dominant-baseline="central">cite graph record</text>

  <!-- CAUTION converges down -->
  <line x1="544" y1="412" x2="468" y2="458" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>

  <!-- No arrow (down) -->
  <line x1="320" y1="428" x2="320" y2="458" stroke="#444444" stroke-width="1.2"
        marker-end="url(#arrow)"/>
  <text x="330" y="448" font-size="10" fill="#444444">no</text>

  <!-- ── Verified Response ── -->
  <rect x="190" y="460" width="290" height="36" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="335" y="478" text-anchor="middle" font-weight="bold" font-size="12" fill="#04342C"
        dominant-baseline="central">Verified response (−83.3% hallucination)</text>

  <!-- Latency annotation -->
  <text x="24" y="298" font-size="10" fill="#666666">+130 ms</text>
  <text x="24" y="312" font-size="10" fill="#666666">security</text>
  <text x="24" y="326" font-size="10" fill="#666666">overhead</text>
  <line x1="56" y1="285" x2="56" y2="340" stroke="#CCCCCC" stroke-width="0.8"
        stroke-dasharray="3 2"/>

</svg>
