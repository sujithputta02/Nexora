<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="'Times New Roman', serif">
  <!-- Legend -->
  <g transform="translate(60, 20)">
    <line x1="0" y1="10" x2="30" y2="10" stroke="#534AB7" stroke-width="2"/>
    <circle cx="15" cy="10" r="4" fill="#534AB7"/>
    <text x="35" y="14" font-size="12" fill="#534AB7">Context diversity (%)</text>

    <line x1="180" y1="10" x2="210" y2="10" stroke="#D85A30" stroke-width="2" stroke-dasharray="4,3"/>
    <rect x="191" y="6" width="8" height="8" fill="#D85A30"/>
    <text x="215" y="14" font-size="12" fill="#993C1D">Hallucination rate (%)</text>

    <!-- Optimal Marker Diamond -->
    <path d="M370,10 L376,4 L382,10 L376,16 Z" fill="#3B6D11" stroke="#27500A" stroke-width="1"/>
    <text x="388" y="14" font-size="12" fill="#3B6D11">Optimal (λ=0.5)</text>
  </g>

  <!-- Y-Axis Left (Diversity) -->
  <g transform="translate(60, 65)" font-size="11" fill="#534AB7" text-anchor="end">
    <text x="-10" y="300">0%</text>
    <text x="-10" y="240">20%</text>
    <text x="-10" y="180">40%</text>
    <text x="-10" y="120">60%</text>
    <text x="-10" y="60">80%</text>
    <text x="-10" y="0">100%</text>
    <text x="-48" y="150" transform="rotate(-90, -48, 150)" text-anchor="middle" font-weight="bold">Context diversity (%)</text>
  </g>

  <!-- Y-Axis Right (Hallucination) -->
  <g transform="translate(615, 65)" font-size="11" fill="#993C1D" text-anchor="start">
    <text x="12" y="300">0%</text>
    <text x="12" y="240">4%</text>
    <text x="12" y="180">8%</text>
    <text x="12" y="120">12%</text>
    <text x="12" y="60">16%</text>
    <text x="12" y="0">20%</text>
    <text x="50" y="150" transform="rotate(90, 50, 150)" text-anchor="middle" font-weight="bold">Hallucination rate (%)</text>
  </g>

  <!-- Horizontal Grid lines -->
  <g transform="translate(60, 65)">
    <line x1="0" y1="0" x2="555" y2="0" stroke="#EEEEEE" stroke-width="1"/>
    <line x1="0" y1="60" x2="555" y2="60" stroke="#EEEEEE" stroke-width="1"/>
    <line x1="0" y1="120" x2="555" y2="120" stroke="#EEEEEE" stroke-width="1"/>
    <line x1="0" y1="180" x2="555" y2="180" stroke="#EEEEEE" stroke-width="1"/>
    <line x1="0" y1="240" x2="555" y2="240" stroke="#EEEEEE" stroke-width="1"/>
    <line x1="0" y1="300" x2="555" y2="300" stroke="#888888" stroke-width="1.2"/>
  </g>

  <!-- Data Plots -->
  <g transform="translate(60, 65)">
    <!-- Diversity Line (Blue) - Data points: λ=0 (85%), λ=0.5 (100%), λ=1 (33%) -->
    <path d="M80,45 Q277,0 480,201" fill="none" stroke="#534AB7" stroke-width="2"/>
    <circle cx="80" cy="45" r="5" fill="#534AB7"/> <!-- λ=0.0 -->
    <path d="M272,0 L277,-6 L282,0 L277,6 Z" fill="#3B6D11" stroke="#27500A" stroke-width="1"/> <!-- λ=0.5 -->
    <circle cx="480" cy="201" r="5" fill="#534AB7"/> <!-- λ=1.0 -->

    <!-- Hallucination Line (Orange Dashed) - Data points: λ=0 (9%), λ=0.5 (3%), λ=1 (14%) -->
    <path d="M80,165 Q277,300 480,90" fill="none" stroke="#D85A30" stroke-width="2" stroke-dasharray="6,4"/>
    <rect x="76" y="161" width="8" height="8" fill="#D85A30"/> <!-- λ=0.0 -->
    <path d="M272,255 L277,249 L282,255 L277,261 Z" fill="#3B6D11" stroke="#27500A" stroke-width="1"/> <!-- λ=0.5 -->
    <rect x="476" y="86" width="8" height="8" fill="#D85A30"/> <!-- λ=1.0 -->
  </g>

  <!-- X-Axis Labels (Corrected Labels based on LangChain logic) -->
  <g transform="translate(60, 370)" font-size="12" text-anchor="middle">
    <g transform="translate(80, 0)">
      <text x="0" y="20">λ = 0.0</text>
      <text x="0" y="36" fill="#666666">(Pure Diversity)</text>
    </g>
    
    <g transform="translate(277, 0)">
      <text x="0" y="20" font-weight="bold">λ = 0.5</text>
      <text x="0" y="36" fill="#3B6D11" font-weight="bold">(Balanced)</text>
    </g>
    
    <g transform="translate(480, 0)">
      <text x="0" y="20">λ = 1.0</text>
      <text x="0" y="36" fill="#666666">(Pure Relevance)</text>
    </g>
  </g>

  <text x="340" y="415" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">
    Figure 4.2 — MMR parameter sweep: Diversity vs. Hallucination trade-off
  </text>
</svg>
