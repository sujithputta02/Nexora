<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="'Glacial Indifference', sans-serif">
  <!-- Legend -->
  <g transform="translate(60, 25)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#534AB7"/>
    <text x="15" y="9" font-size="11" fill="#666666">FAISS + MMR</text>
    <rect x="110" y="0" width="10" height="10" rx="2" fill="#1D9E75"/>
    <text x="125" y="9" font-size="11" fill="#666666">Neo4j Query</text>
    <rect x="220" y="0" width="10" height="10" rx="2" fill="#5F5E5A"/>
    <text x="235" y="9" font-size="11" fill="#666666">Prompt Orchestration</text>
    <rect x="375" y="0" width="10" height="10" rx="2" fill="#D85A30"/>
    <text x="390" y="9" font-size="11" fill="#993C1D">Graph-NLI Audit</text>
  </g>

  <!-- Stacked Bar (Broad Height - 80px) -->
  <g transform="translate(60, 65)">
    <rect x="0" y="0" width="350" height="80" fill="#534AB7" stroke="#26215C" stroke-width="1"/>
    <rect x="350" y="0" width="50" height="80" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
    <rect x="400" y="0" width="50" height="80" fill="#5F5E5A" stroke="#2C2C2A" stroke-width="1"/>
    <rect x="450" y="0" width="130" height="80" fill="#D85A30" stroke="#993C1D" stroke-width="1.2"/>

    <!-- X-Axis Ticks -->
    <g transform="translate(0, 95)" font-size="11" fill="#888888">
      <text x="0" y="10" text-anchor="middle">0 ms</text>
      <text x="100" y="10" text-anchor="middle">100 ms</text>
      <text x="200" y="10" text-anchor="middle">200 ms</text>
      <text x="300" y="10" text-anchor="middle">300 ms</text>
      <text x="400" y="10" text-anchor="middle">400 ms</text>
      <text x="500" y="10" text-anchor="middle">500 ms</text>
      <text x="580" y="10" text-anchor="middle" font-weight="bold" fill="#333333">580 ms</text>
    </g>
  </g>

  <!-- Metric Summary Cards -->
  <g transform="translate(60, 205)">
    <!-- 1 -->
    <rect x="0" y="0" width="130" height="70" rx="6" fill="#FDFDFD" stroke="#EEEEEE" stroke-width="1"/>
    <text x="65" y="20" font-size="10" text-anchor="middle" fill="#555555" font-weight="bold">FAISS + MMR</text>
    <text x="65" y="48" font-size="22" text-anchor="middle" font-weight="bold" fill="#333333">350 ms</text>
    <text x="65" y="62" font-size="10" text-anchor="middle" fill="#999999">60.3%</text>

    <!-- 2 -->
    <rect x="145" y="0" width="130" height="70" rx="6" fill="#FDFDFD" stroke="#EEEEEE" stroke-width="1"/>
    <text x="210" y="20" font-size="10" text-anchor="middle" fill="#555555" font-weight="bold">NEO4J QUERY</text>
    <text x="210" y="48" font-size="22" text-anchor="middle" font-weight="bold" fill="#333333">50 ms</text>
    <text x="210" y="62" font-size="10" text-anchor="middle" fill="#999999">0.86%</text>

    <!-- 3 -->
    <rect x="290" y="0" width="130" height="70" rx="6" fill="#FDFDFD" stroke="#EEEEEE" stroke-width="1"/>
    <text x="355" y="20" font-size="10" text-anchor="middle" fill="#555555" font-weight="bold">ORCHESTRATION</text>
    <text x="355" y="48" font-size="22" text-anchor="middle" font-weight="bold" fill="#333333">50 ms</text>
    <text x="355" y="62" font-size="10" text-anchor="middle" fill="#999999">0.86%</text>

    <!-- 4 -->
    <rect x="435" y="0" width="130" height="70" rx="6" fill="#FFF8F5" stroke="#D85A30" stroke-width="1.2"/>
    <text x="500" y="20" font-size="10" text-anchor="middle" fill="#993C1D" font-weight="bold">GRAPH-NLI AUDIT</text>
    <text x="500" y="48" font-size="22" text-anchor="middle" font-weight="bold" fill="#D85A30">130 ms</text>
    <text x="500" y="62" font-size="10" text-anchor="middle" fill="#993C1D">22.4% — SECURITY</text>
  </g>

  <!-- Captions and Important Footnote -->
  <text x="340" y="325" text-anchor="middle" font-size="15" font-weight="bold" fill="#111111">
    Figure 4.3 — Integrated Pipeline Latency Breakdown (Total Overhead: 580 ms)
  </text>
  <text x="340" y="350" text-anchor="middle" font-size="12" fill="#888888" font-style="italic">
    *Latency metrics reflect system orchestration overhead; total E2E time ~25.4s including Llama-3-8B local inference.
  </text>
